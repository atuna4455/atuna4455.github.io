<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HelioWatch – Güneş Fırtınası Erken Uyarı Sistemi</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   TOKENS & RESET
═══════════════════════════════════════════ */
:root {
  --bg:       #020810;
  --bg2:      #060e1f;
  --panel:    #07111f;
  --border:   #12233a;
  --border2:  #1e3555;
  --accent:   #f5820a;
  --accent2:  #ffbb00;
  --cyan:     #00d4ff;
  --green:    #00ff99;
  --yellow:   #ffd600;
  --red:      #ff3355;
  --text:     #b8cce0;
  --dim:      #3e5270;
  --white:    #e8f4ff;
  --hd: 'Orbitron', monospace;
  --mono: 'Share Tech Mono', monospace;
  --body: 'Rajdhani', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 16px;
  line-height: 1.6;
  overflow-x: hidden;
}
::selection { background: rgba(0,212,255,.25); }

/* ═══════════════════════════════════════════
   CANVAS STARFIELD
═══════════════════════════════════════════ */
#starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* ═══════════════════════════════════════════
   SOLAR CORONA DECORATIONS
═══════════════════════════════════════════ */
.corona-1 {
  position: fixed; top: -200px; right: -200px; width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(245,130,10,.22) 0%, rgba(245,130,10,.06) 40%, transparent 70%);
  animation: corona-pulse 5s ease-in-out infinite; pointer-events: none; z-index: 0;
}
.corona-2 {
  position: fixed; bottom: -300px; left: -300px; width: 700px; height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,255,.08) 0%, transparent 60%);
  animation: corona-pulse 7s ease-in-out infinite reverse; pointer-events: none; z-index: 0;
}
@keyframes corona-pulse { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.08);opacity:1} }

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
  height: 64px;
  background: rgba(2,8,16,.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: var(--hd); font-size: 1.1rem; font-weight: 900;
  letter-spacing: .18em;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.nav-links { display: flex; gap: 32px; }
.nav-links a {
  font-family: var(--mono); font-size: .72rem; letter-spacing: .15em;
  color: var(--dim); text-decoration: none; text-transform: uppercase;
  transition: color .2s;
}
.nav-links a:hover { color: var(--cyan); }
.nav-status {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: .7rem; color: var(--green);
}
.pulse-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--green);
  animation: pulse-dot 1.2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

/* ═══════════════════════════════════════════
   SECTIONS BASE
═══════════════════════════════════════════ */
section { position: relative; z-index: 1; }
.container { max-width: 1100px; margin: 0 auto; padding: 0 32px; }

/* ═══════════════════════════════════════════
   HERO
═══════════════════════════════════════════ */
#hero {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding: 100px 32px 60px;
}
.hero-eyebrow {
  font-family: var(--mono); font-size: .72rem; letter-spacing: .4em;
  color: var(--cyan); margin-bottom: 20px; opacity: 0;
  animation: fade-up .8s .2s forwards;
}
.hero-title {
  font-family: var(--hd); font-weight: 900;
  font-size: clamp(3rem, 9vw, 7rem);
  line-height: .95; letter-spacing: .06em;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 40%, var(--cyan) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-size: 200%; animation: shimmer 6s linear infinite, fade-up .8s .4s forwards;
  opacity: 0;
}
@keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }
.hero-sub {
  font-family: var(--hd); font-size: clamp(.85rem, 2vw, 1.1rem);
  letter-spacing: .25em; color: var(--dim); margin-top: 16px;
  opacity: 0; animation: fade-up .8s .6s forwards;
}
.hero-desc {
  max-width: 600px; font-size: 1.05rem; color: var(--text);
  margin: 28px auto 0; line-height: 1.8;
  opacity: 0; animation: fade-up .8s .8s forwards;
}
.hero-cta {
  display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
  margin-top: 40px; opacity: 0; animation: fade-up .8s 1s forwards;
}
.btn {
  font-family: var(--hd); font-size: .72rem; letter-spacing: .18em;
  padding: 14px 32px; border-radius: 4px; cursor: pointer;
  border: none; text-decoration: none; display: inline-block;
  transition: all .25s; text-transform: uppercase;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #000; font-weight: 700;
  box-shadow: 0 0 30px rgba(245,130,10,.35);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 50px rgba(245,130,10,.55); }
.btn-outline {
  background: transparent; color: var(--cyan);
  border: 1px solid var(--cyan);
}
.btn-outline:hover { background: rgba(0,212,255,.12); transform: translateY(-2px); }

.hero-stats {
  display: flex; gap: 48px; justify-content: center; flex-wrap: wrap;
  margin-top: 64px; opacity: 0; animation: fade-up .8s 1.2s forwards;
}
.hero-stat { text-align: center; }
.hero-stat-num {
  font-family: var(--hd); font-size: 2.2rem; font-weight: 900;
  color: var(--white); line-height: 1;
}
.hero-stat-num span { color: var(--accent); }
.hero-stat-label { font-family: var(--mono); font-size: .68rem; letter-spacing: .2em; color: var(--dim); margin-top: 6px; }

@keyframes fade-up { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

/* Scroll indicator */
.scroll-hint {
  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
  font-family: var(--mono); font-size: .65rem; letter-spacing: .2em; color: var(--dim);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  animation: bounce 2s ease-in-out infinite;
}
.scroll-hint::after { content:'↓'; font-size: 1rem; color: var(--accent); }
@keyframes bounce { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(6px)} }

/* ═══════════════════════════════════════════
   LIVE DASHBOARD
═══════════════════════════════════════════ */
#dashboard { padding: 100px 0 80px; }
.section-header { text-align: center; margin-bottom: 56px; }
.section-tag {
  font-family: var(--mono); font-size: .7rem; letter-spacing: .35em;
  color: var(--accent); text-transform: uppercase; margin-bottom: 12px;
}
.section-title {
  font-family: var(--hd); font-size: clamp(1.6rem, 4vw, 2.8rem);
  font-weight: 900; color: var(--white); letter-spacing: .08em;
}
.section-desc { font-size: 1rem; color: var(--dim); margin-top: 12px; max-width: 500px; margin-left: auto; margin-right: auto; }

/* Alert Banner */
#alert-banner {
  border-radius: 6px; padding: 16px 24px; margin-bottom: 28px;
  font-family: var(--hd); font-size: .85rem; letter-spacing: .15em;
  text-align: center; border: 1px solid; transition: all .5s;
  display: flex; align-items: center; justify-content: center; gap: 12px;
}
#alert-banner::before { content: '●'; font-size: 1rem; }
#alert-banner.green  { background: rgba(0,255,153,.07); border-color: var(--green);  color: var(--green);  }
#alert-banner.yellow { background: rgba(255,214,0,.07);  border-color: var(--yellow); color: var(--yellow); animation: blink 1.8s ease-in-out infinite; }
#alert-banner.red    { background: rgba(255,51,85,.1);   border-color: var(--red);    color: var(--red);    animation: blink .85s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.45} }

/* Dashboard grid */
.dash-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.dash-full  { grid-column: 1/-1; }
.dash-half  { grid-column: span 1; }
.dash-two   { grid-column: span 2; }
@media(max-width:768px) {
  .dash-grid { grid-template-columns: 1fr; }
  .dash-two  { grid-column: span 1; }
}

/* Panel card */
.panel {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; padding: 22px 24px; position: relative; overflow: hidden;
  transition: border-color .3s, transform .3s;
}
.panel:hover { border-color: var(--border2); transform: translateY(-2px); }
.panel::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
}
.panel-tag {
  font-family: var(--mono); font-size: .68rem; letter-spacing: .22em;
  color: var(--dim); text-transform: uppercase; margin-bottom: 14px;
}

/* Gauge */
#gauge-wrap { display: flex; flex-direction: column; align-items: center; }
#gauge-svg  { width: 100%; max-width: 200px; }
#gauge-val  { font-family: var(--hd); font-size: 1.9rem; font-weight: 700; color: var(--accent); margin-top: 6px; }
#gauge-unit { font-family: var(--mono); font-size: .68rem; letter-spacing: .2em; color: var(--dim); }

/* Stat rows */
.stat { display: flex; justify-content: space-between; align-items: baseline; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: .9rem; }
.stat:last-child { border-bottom: none; }
.stat-lbl { color: var(--dim); font-family: var(--mono); font-size: .7rem; letter-spacing: .1em; }
.stat-v { font-family: var(--hd); font-size: .88rem; color: var(--white); }

/* Countdown */
#cd-box { text-align: center; padding: 8px 0; }
#cd-val  { font-family: var(--hd); font-size: 3rem; font-weight: 900; color: var(--cyan); line-height: 1; }
#cd-lbl  { font-family: var(--mono); font-size: .68rem; letter-spacing: .22em; color: var(--dim); margin-top: 8px; }
#cd-time { font-size: .82rem; color: var(--text); margin-top: 12px; }

/* Progress */
.prog-wrap { margin-top: 16px; }
.prog-lbl  { font-family: var(--mono); font-size: .68rem; letter-spacing: .12em; color: var(--dim); margin-bottom: 6px; }
.prog-bar  { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; transition: width .9s ease, background .5s; background: var(--cyan); }

/* UTC clock */
#utc-clock {
  text-align: center; font-family: var(--hd); font-size: .95rem;
  color: var(--cyan); letter-spacing: .22em; margin-bottom: 24px; opacity: .8;
}

/* Event list */
#ev-list { list-style: none; }
#ev-list li {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid var(--border);
  font-size: .85rem; gap: 10px;
}
#ev-list li:last-child { border-bottom: none; }
.ev-t { font-family: var(--mono); color: var(--dim); font-size: .72rem; min-width: 140px; }
.ev-s { font-family: var(--hd); font-size: .85rem; }
.badge {
  font-family: var(--hd); font-size: .62rem; letter-spacing: .12em;
  padding: 3px 9px; border-radius: 3px; white-space: nowrap;
}
.bg { background: rgba(0,255,153,.12); color: var(--green);  border: 1px solid rgba(0,255,153,.3); }
.by { background: rgba(255,214,0,.1);  color: var(--yellow); border: 1px solid rgba(255,214,0,.3); }
.br { background: rgba(255,51,85,.12); color: var(--red);    border: 1px solid rgba(255,51,85,.35); }

/* Dash buttons */
.dash-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
.dbtn {
  font-family: var(--hd); font-size: .68rem; letter-spacing: .14em;
  padding: 10px 18px; border-radius: 4px; cursor: pointer; border: 1px solid;
  transition: all .2s; background: transparent;
}
.dbtn-a { color: var(--accent); border-color: var(--accent); }
.dbtn-a:hover { background: rgba(245,130,10,.15); }
.dbtn-c { color: var(--cyan); border-color: var(--cyan); }
.dbtn-c:hover { background: rgba(0,212,255,.12); }

.formula-box {
  background: rgba(0,212,255,.04); border: 1px solid rgba(0,212,255,.12);
  border-radius: 6px; padding: 14px 18px; font-size: .82rem;
  color: var(--dim); line-height: 1.8; margin-top: 18px;
}
.formula-box code { color: var(--cyan); font-family: var(--mono); }

#src-info { font-family: var(--mono); font-size: .68rem; color: var(--dim); margin-top: 18px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
.dl { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
.dl-live { background: var(--green); animation: blink .9s infinite; }
.dl-demo { background: var(--yellow); }

/* ═══════════════════════════════════════════
   PROBLEM SECTION
═══════════════════════════════════════════ */
#problem { padding: 100px 0; background: linear-gradient(180deg, transparent, rgba(245,130,10,.03) 50%, transparent); }
.problem-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 48px; }
@media(max-width:680px) { .problem-grid { grid-template-columns: 1fr; } }
.problem-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; padding: 28px; position: relative; overflow: hidden;
}
.problem-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--accent);
}
.problem-icon { font-size: 2rem; margin-bottom: 14px; }
.problem-title { font-family: var(--hd); font-size: .9rem; font-weight: 700; color: var(--white); letter-spacing: .1em; margin-bottom: 8px; }
.problem-text { font-size: .95rem; color: var(--text); line-height: 1.7; }

/* Timeline */
.timeline { margin-top: 64px; position: relative; }
.timeline::before {
  content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
  width: 1px; background: linear-gradient(180deg, transparent, var(--border2), transparent);
  transform: translateX(-50%);
}
@media(max-width:600px) { .timeline::before { left: 20px; } }
.tl-item {
  display: flex; gap: 40px; align-items: flex-start; margin-bottom: 48px;
  opacity: 0; transform: translateY(20px); transition: all .6s;
}
.tl-item.visible { opacity: 1; transform: translateY(0); }
.tl-item:nth-child(even) { flex-direction: row-reverse; }
@media(max-width:600px) { .tl-item, .tl-item:nth-child(even) { flex-direction: column; } }
.tl-side { flex: 1; }
.tl-dot-wrap {
  flex: 0 0 auto; display: flex; flex-direction: column; align-items: center;
}
.tl-dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--accent); border: 3px solid var(--bg);
  box-shadow: 0 0 16px rgba(245,130,10,.5);
  z-index: 1;
}
.tl-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; padding: 20px 22px;
}
.tl-year { font-family: var(--hd); font-size: .72rem; letter-spacing: .2em; color: var(--accent); margin-bottom: 6px; }
.tl-title { font-family: var(--hd); font-size: .95rem; color: var(--white); margin-bottom: 6px; }
.tl-text { font-size: .9rem; color: var(--text); line-height: 1.65; }

/* ═══════════════════════════════════════════
   HOW IT WORKS
═══════════════════════════════════════════ */
#how { padding: 100px 0; }
.steps { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-top: 48px; }
@media(max-width:800px) { .steps { grid-template-columns: 1fr 1fr; } }
@media(max-width:480px) { .steps { grid-template-columns: 1fr; } }
.step {
  background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  padding: 28px 22px; text-align: center; position: relative;
  transition: border-color .3s, transform .3s;
}
.step:hover { border-color: var(--accent); transform: translateY(-4px); }
.step-num {
  font-family: var(--hd); font-size: 3rem; font-weight: 900;
  color: var(--border2); position: absolute; top: 14px; right: 16px;
}
.step-icon { font-size: 2.2rem; margin-bottom: 16px; }
.step-title { font-family: var(--hd); font-size: .82rem; font-weight: 700; color: var(--white); letter-spacing: .12em; margin-bottom: 10px; }
.step-text { font-size: .9rem; color: var(--text); line-height: 1.65; }

/* Arrow connectors */
.steps-arrow { display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 1.4rem; }

/* Formula strip */
.formula-strip {
  background: linear-gradient(135deg, rgba(245,130,10,.06), rgba(0,212,255,.06));
  border: 1px solid var(--border2); border-radius: 10px;
  padding: 32px 40px; margin-top: 56px; text-align: center;
}
.formula-main {
  font-family: var(--mono); font-size: clamp(1rem, 2.5vw, 1.5rem);
  color: var(--white); letter-spacing: .08em;
}
.formula-main .hl { color: var(--accent); font-weight: 700; }
.formula-main .hl2 { color: var(--cyan); }
.formula-note-text { font-size: .85rem; color: var(--dim); margin-top: 10px; }

/* ═══════════════════════════════════════════
   TEAM
═══════════════════════════════════════════ */
#team { padding: 100px 0; background: linear-gradient(180deg, transparent, rgba(0,212,255,.02) 50%, transparent); }
.team-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-top: 48px; }
@media(max-width:900px) { .team-grid { grid-template-columns: repeat(3,1fr); } }
@media(max-width:500px) { .team-grid { grid-template-columns: 1fr 1fr; } }
.team-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; padding: 24px 16px; text-align: center;
  transition: all .3s; position: relative; overflow: hidden;
}
.team-card:hover { border-color: var(--cyan); transform: translateY(-4px); }
.team-card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  opacity: 0; transition: opacity .3s;
}
.team-card:hover::after { opacity: 1; }
.team-avatar {
  width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 14px;
  background: linear-gradient(135deg, var(--bg2), var(--border2));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--hd); font-size: 1.3rem; font-weight: 900;
  color: var(--cyan); border: 2px solid var(--border2);
}
.team-name { font-family: var(--hd); font-size: .78rem; font-weight: 700; color: var(--white); letter-spacing: .1em; margin-bottom: 4px; }
.team-role { font-family: var(--mono); font-size: .65rem; letter-spacing: .12em; color: var(--dim); }
.team-badge {
  display: inline-block; margin-top: 8px; padding: 2px 8px; border-radius: 3px;
  font-family: var(--mono); font-size: .6rem; letter-spacing: .1em;
  background: rgba(0,212,255,.1); color: var(--cyan); border: 1px solid rgba(0,212,255,.25);
}

.team-name-strip {
  text-align: center; margin-top: 40px;
  font-family: var(--hd); font-size: .78rem; letter-spacing: .3em;
  color: var(--dim); text-transform: uppercase;
}
.team-name-strip span { color: var(--accent); }

/* ═══════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════ */
footer {
  position: relative; z-index: 1;
  border-top: 1px solid var(--border); padding: 40px 32px;
  text-align: center;
}
.footer-logo { font-family: var(--hd); font-size: 1.5rem; font-weight: 900; letter-spacing: .18em; background: linear-gradient(135deg, var(--accent), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
.footer-tagline { font-family: var(--mono); font-size: .7rem; letter-spacing: .22em; color: var(--dim); }
.footer-team { margin-top: 10px; font-family: var(--mono); font-size: .68rem; color: var(--dim); }
.footer-team span { color: var(-
